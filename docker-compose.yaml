services:
  booking_service:
    build: ./booking-service
    container_name: booking-service
    working_dir: /app/booking-service
    ports:
      - "8001:8000"
    volumes:
      - .:/app
    depends_on:
      - boocking_db
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    environment:
      - PYTHONPATH=/app

  boocking_db:
    image: postgres:16
    container_name: boocking_db
    environment:
      POSTGRES_USER: ${BOOKING_USER}
      POSTGRES_PASSWORD: ${BOOKING_PASSWORD}
      POSTGRES_DB: ${BOOKING_DB}
    ports:
      - "5433:5432"
    volumes:
      - booking_pgdata:/var/lib/postgresql/data

  cinema_service:
    build: ./cinema-service
    container_name: cinema-service
    working_dir: /app/cinema-service
    ports:
      - "8002:8000"
    volumes:
      - .:/app
    depends_on:
      - cinema_db
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    environment:
      - PYTHONPATH=/app

  cinema_db:
    image: postgres:16
    container_name: cinema_db
    environment:
      POSTGRES_USER: ${CINEMA_USER}
      POSTGRES_PASSWORD: ${CINEMA_PASSWORD}
      POSTGRES_DB: ${CINEMA_DB}
    ports:
      - "5434:5432"
    volumes:
      - cinema_pgdata:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin4
    depends_on:
      - boocking_db
      - cinema_db
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin

  redis:
    image: redis:7
    command: ["redis-server", "--notify-keyspace-events", "Ex"]
    container_name: cinema_redis
    ports:
      - "6379:6379"

volumes:
  booking_pgdata:
  cinema_pgdata:
  pgadmin_data:
